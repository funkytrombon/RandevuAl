<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RandevuAl SaaS Admin Paneli</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-800">

<div x-data="adminApp()" x-init="initApp()" class="min-h-screen">
    <!-- Navbar -->
    <nav class="bg-indigo-600 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <span class="font-bold text-xl">RandevuAl SaaS</span>
                </div>
                <div>
                    <button @click="openModal()" class="bg-white text-indigo-600 px-4 py-2 rounded-md font-semibold text-sm shadow hover:bg-gray-100 transition">
                        + Yeni Firma Ekle
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- İstatistikler -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white rounded-lg shadow p-6 border-l-4 border-indigo-500">
                <h3 class="text-sm font-medium text-gray-500 uppercase">Toplam Müşteri (Firma)</h3>
                <p class="mt-2 text-3xl font-bold text-gray-900" x-text="tenants.length"></p>
            </div>
            <div class="bg-white rounded-lg shadow p-6 border-l-4 border-green-500">
                <h3 class="text-sm font-medium text-gray-500 uppercase">Toplam AI Mesajı (Bu Ay)</h3>
                <p class="mt-2 text-3xl font-bold text-gray-900" x-text="totalMessages"></p>
            </div>
        </div>

        <!-- Müşteri Listesi -->
        <div class="bg-white shadow rounded-lg overflow-hidden">
            <div class="px-6 py-5 border-b border-gray-200">
                <h3 class="text-lg font-medium leading-6 text-gray-900">Kayıtlı Firmalar (Tenants)</h3>
            </div>
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ID / Firma Adı</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Sektör</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Twilio / WhatsApp</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Plan / Kota</th>
                            <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">İşlem</th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-gray-200">
                        <template x-for="t in tenants" :key="t.id">
                            <tr class="hover:bg-gray-50">
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <div class="flex items-center">
                                        <div class="h-10 w-10 flex-shrink-0 bg-indigo-100 rounded-full flex items-center justify-center text-indigo-700 font-bold" x-text="t.company_name.charAt(0)"></div>
                                        <div class="ml-4">
                                            <div class="text-sm font-medium text-gray-900" x-text="t.company_name"></div>
                                            <div class="text-sm text-gray-500">ID: <span x-text="t.id"></span></div>
                                        </div>
                                    </div>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-blue-100 text-blue-800" x-text="t.sector"></span>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                                    <div x-text="t.twilio_number || t.whatsapp_number || 'Numara Yok'"></div>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <div class="text-sm text-gray-900 capitalize" x-text="t.subscription_plan"></div>
                                    <div class="text-xs text-gray-500"><span x-text="t.current_month_ai_calls || 0"></span> mesaj atıldı</div>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                                    <button @click="openModal(t)" class="text-indigo-600 hover:text-indigo-900 bg-indigo-50 px-3 py-1 rounded">Düzenle</button>
                                </td>
                            </tr>
                        </template>
                        <tr x-show="tenants.length === 0">
                            <td colspan="5" class="px-6 py-8 text-center text-gray-500">Henüz firma kaydı yok.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Ekle/Düzenle Modal -->
    <div x-show="modalOpen" class="fixed z-10 inset-0 overflow-y-auto" style="display: none;" aria-labelledby="modal-title" role="dialog" aria-modal="true">
        <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
            <!-- Arka plan overlay -->
            <div x-show="modalOpen" @click="closeModal()" class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" aria-hidden="true"></div>
            <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
            
            <!-- Modal paneli -->
            <div class="inline-block align-bottom bg-white rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-2xl sm:w-full">
                <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                    <h3 class="text-lg leading-6 font-medium text-gray-900 mb-4" id="modal-title">
                        <span x-text="editingId ? 'Firmayı Düzenle: ' + form.company_name : 'Yeni Firma Ekle'"></span>
                    </h3>
                    
                    <form @submit.prevent="saveTenant" class="space-y-4">
                        
                        <!-- Hazır Şablon Modülü (Sadece yeni firmalar için) -->
                        <div x-show="!editingId" class="mb-4 p-4 bg-indigo-50 border border-indigo-200 rounded-lg">
                            <label class="block text-sm font-bold text-indigo-700 mb-2">🚀 Hızlı Kurulum Şablonu (Opsiyonel)</label>
                            <select x-model="selectedTemplate" @change="applyTemplate()" class="mt-1 block w-full border border-gray-300 bg-white rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                                <option value="">-- Şablon Seç (Tüm alanları kendi doldurur) --</option>
                                <template x-for="tpl in templates" :key="tpl.id">
                                    <option :value="tpl.id" x-text="tpl.name"></option>
                                </template>
                            </select>
                            <p class="text-xs text-indigo-500 mt-2">Şablon seçerseniz sektör, yapay zeka tonu ve taslak bilgiler otomatik yüklenir. Sonradan düzenleyebilirsiniz.</p>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <!-- Temel Bilgiler -->
                            <div class="col-span-2 sm:col-span-1">
                                <label class="block text-sm font-medium text-gray-700">Firma Adı</label>
                                <input type="text" x-model="form.company_name" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                            </div>
                            <div class="col-span-2 sm:col-span-1">
                                <label class="block text-sm font-medium text-gray-700">Sektör (Örn: health, real_estate)</label>
                                <input type="text" x-model="form.sector" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                            </div>
                            <div class="col-span-2 sm:col-span-1">
                                <label class="block text-sm font-medium text-gray-700">Twilio Numarası</label>
                                <input type="text" x-model="form.twilio_number" placeholder="+14155238886" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                            </div>
                            <div class="col-span-2 sm:col-span-1">
                                <label class="block text-sm font-medium text-gray-700">Paket/Plan Merkezi</label>
                                <select x-model="form.subscription_plan" class="mt-1 block w-full border border-gray-300 bg-white rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                                    <option value="free">Ücretsiz (Free) - Aylık 50 Mesaj</option>
                                    <option value="starter">Başlangıç (Starter) - Aylık 500 Mesaj</option>
                                    <option value="pro">Profesyonel (Pro) - Sınırsız Mesaj</option>
                                </select>
                            </div>

                            <!-- Hizmet ve Saatler -->
                            <div class="col-span-2">
                                <label class="block text-sm font-medium text-gray-700">Sunulan Hizmetler (Virgülle)</label>
                                <input type="text" x-model="form.services" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                            </div>

                            <div class="col-span-2 sm:col-span-1">
                                <label class="block text-sm font-medium text-gray-700">Cal.com API Key</label>
                                <input type="password" x-model="form.cal_api_key" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                            </div>
                            <div class="col-span-2 sm:col-span-1">
                                <label class="block text-sm font-medium text-gray-700">Cal.com EventType ID</label>
                                <input type="number" x-model="form.cal_event_type_id" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                            </div>

                            <!-- AI Davranışı ve SSS -->
                            <div class="col-span-2">
                                <label class="block text-sm font-medium text-gray-700">AI Kişiliği (Tone of Voice)</label>
                                <input type="text" x-model="form.ai_personality" placeholder="Sen nazik bir güzellik uzmanısın..." class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                            </div>
                            <div class="col-span-2">
                                <label class="block text-sm font-medium text-gray-700">Bilgi Bankası (Serbest Metin FAQ)</label>
                                <textarea x-model="form.faq_text" rows="4" placeholder="Adres: Şişli Meydanı... Ücret: 500TL. Randevu için ön ödenek sormayınız." class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"></textarea>
                            </div>
                        </div>
                        
                        <div class="bg-gray-50 pt-3 sm:flex sm:flex-row-reverse border-t mt-4">
                            <button type="submit" class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-indigo-600 text-base font-medium text-white hover:bg-indigo-700 focus:outline-none sm:ml-3 sm:w-auto sm:text-sm">
                                Kaydet
                            </button>
                            <button type="button" @click="closeModal()" class="mt-3 w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 focus:outline-none sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm">
                                İptal
                            </button>
                            <button type="button" x-show="editingId" @click="deleteTenant(editingId)" class="mt-3 sm:mt-0 w-full inline-flex justify-center rounded-md border border-red-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-red-700 hover:bg-red-50 focus:outline-none sm:w-auto sm:text-sm mr-auto">
                                Firmayı Sil
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('alpine:init', () => {
    Alpine.data('adminApp', () => ({
        tenants: [],
        templates: [], // Hazır şablonlar
        selectedTemplate: '', // Seçili şablon id
        modalOpen: false,
        editingId: null,
        form: {
            company_name: '',
            sector: 'health',
            twilio_number: '',
            subscription_plan: 'free',
            services: 'Genel Muayene',
            cal_api_key: '',
            cal_event_type_id: '',
            ai_personality: '',
            faq_text: ''
        },

        get totalMessages() {
            return this.tenants.reduce((acc, t) => acc + (t.current_month_ai_calls || 0), 0);
        },

        async initApp() {
            await this.fetchTenants();
            await this.fetchTemplates();
        },

        async fetchTenants() {
            const res = await fetch('/admin/api/tenants');
            if (res.ok) this.tenants = await res.json();
            else alert("Veriler alınamadı, yetkiniz olmayabilir.");
        },

        async fetchTemplates() {
            const res = await fetch('/admin/api/templates');
            if (res.ok) this.templates = await res.json();
        },

        applyTemplate() {
            if (!this.selectedTemplate) return;
            const tpl = this.templates.find(x => x.id === this.selectedTemplate);
            if (tpl) {
                if (!this.form.company_name) this.form.company_name = tpl.name;
                this.form.sector = tpl.sector;
                this.form.services = tpl.services;
                this.form.ai_personality = tpl.ai_personality;
                this.form.faq_text = tpl.faq_text;
            }
        },

        openModal(tenant = null) {
            this.modalOpen = true;
            if (tenant) {
                this.editingId = tenant.id;
                this.form = { ...tenant };
            } else {
                this.editingId = null;
                this.form = {
                    company_name: '',
                    sector: 'health',
                    twilio_number: '',
                    subscription_plan: 'free',
                    services: 'Genel Muayene',
                    cal_api_key: '',
                    cal_event_type_id: '',
                    ai_personality: '',
                    faq_text: ''
                };
            }
        },

        closeModal() {
            this.modalOpen = false;
        },

        async saveTenant() {
            const method = this.editingId ? 'PUT' : 'POST';
            const url = this.editingId ? `/admin/api/tenants/${this.editingId}` : '/admin/api/tenants';
            
            const req = await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(this.form)
            });

            if (req.ok) {
                this.closeModal();
                this.fetchTenants();
            } else {
                alert("Kayıt sırasında hata oluştu!");
            }
        },

        async deleteTenant(id) {
            if(confirm("Bu firmayı tamamen silmek istediğinize emin misiniz? (İşlem geri alınamaz)")) {
                const req = await fetch(`/admin/api/tenants/${id}`, { method: 'DELETE' });
                if (req.ok) {
                    this.closeModal();
                    this.fetchTenants();
                } else alert("Silinemedi!");
            }
        }
    }));
});
</script>
</body>
</html>
